<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة إدخال الإجازات المرضية - نسخة ذكية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#2563eb;--primary-dark:#1d4ed8;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--gray:#6b7280;--light:#f3f4f6;--border:#e5e7eb;--shadow:0 4px 6px -1px rgba(0,0,0,0.1);--radius:12px}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Tajawal',sans-serif}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-container{background:white;border-radius:var(--radius);padding:40px;box-shadow:var(--shadow);width:100%;max-width:400px;text-align:center}
.login-container h1{color:var(--primary);margin-bottom:30px;font-size:28px}
.form-group{margin-bottom:20px;text-align:right}
.form-group label{display:block;margin-bottom:8px;color:var(--gray);font-weight:500}
.form-group input{width:100%;padding:12px;border:2px solid var(--border);border-radius:8px;font-size:16px;transition:border-color 0.3s}
.form-group input:focus{outline:none;border-color:var(--primary)}
.btn-primary{width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:background 0.3s}
.btn-primary:hover{background:var(--primary-dark)}
.btn-primary:disabled{background:var(--gray);cursor:not-allowed}
#error{display:none;margin-top:15px;padding:10px;border-radius:8px;font-size:14px}
.app-container{background:white;border-radius:var(--radius);box-shadow:var(--shadow);width:100%;max-width:1200px;max-height:95vh;overflow-y:auto;display:none}
.header{background:var(--primary);color:white;padding:20px 30px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header h1{font-size:24px}
.header-actions{display:flex;gap:15px;align-items:center}
.btn-logout{background:rgba(255,255,255,0.2);color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:500;transition:background 0.3s}
.btn-logout:hover{background:rgba(255,255,255,0.3)}
.tabs{display:flex;background:var(--light);border-bottom:1px solid var(--border);position:sticky;top:73px;z-index:99}
.tab-btn{flex:1;padding:15px;border:none;background:none;font-size:16px;font-weight:500;color:var(--gray);cursor:pointer;transition:all 0.3s;border-bottom:3px solid transparent}
.tab-btn:hover{background:rgba(37,99,235,0.05)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);background:white}
.tab-content{display:none;padding:30px}
.tab-content.active{display:block}
.section{margin-bottom:40px}
.section-title{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;color:var(--primary);margin-bottom:25px;padding-bottom:15px;border-bottom:2px solid var(--light)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
.field-group{margin-bottom:20px;position:relative}
.field-group label{display:block;margin-bottom:8px;color:var(--gray);font-weight:500;font-size:14px}
.field-group input, .field-group select{width:100%;padding:12px;border:2px solid var(--border);border-radius:8px;font-size:15px;transition:border-color 0.3s;background:white}
.field-group input:focus, .field-group select:focus{outline:none;border-color:var(--primary)}
.field-group input[readonly]{background:var(--light);cursor:not-allowed}
.field-group .input-with-btn{display:flex;gap:10px}
.field-group .input-with-btn input{flex:1}
.btn-translate{padding:12px 20px;background:var(--success);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:500;transition:background 0.3s;white-space:nowrap}
.btn-translate:hover{background:#059669}
.btn-translate:disabled{background:var(--gray);cursor:not-allowed}
.btn-submit{width:100%;padding:16px;background:var(--primary);color:white;border:none;border-radius:8px;font-size:18px;font-weight:600;cursor:pointer;transition:background 0.3s;margin-top:20px}
.btn-submit:hover{background:var(--primary-dark)}
.btn-submit:disabled{background:var(--gray);cursor:not-allowed}
#submitStatus{margin-top:15px;padding:12px;border-radius:8px;text-align:center;font-weight:500;display:none}
#submitStatus.success{background:#d1fae5;color:#065f46;display:block}
#submitStatus.error{background:#fee2e2;color:#991b1b;display:block}
#pdfArea{text-align:center;margin-top:20px}
#pdfArea a{color:var(--primary);text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:var(--light);border-radius:8px;transition:background 0.3s}
#pdfArea a:hover{background:var(--border)}
.hospital-suggestions{position:absolute;top:100%;left:0;right:0;background:white;border:1px solid var(--border);border-radius:8px;max-height:200px;overflow-y:auto;z-index:1000;display:none;box-shadow:var(--shadow)}
.hospital-suggestions div{padding:12px;cursor:pointer;transition:background 0.3s}
.hospital-suggestions div:hover{background:var(--light)}
.leaves-list{display:grid;gap:15px}
.leave-card{background:var(--light);border-radius:8px;padding:20px;display:flex;justify-content:space-between;align-items:center;transition:box-shadow 0.3s}
.leave-card:hover{box-shadow:var(--shadow)}
.leave-info h3{color:var(--primary);margin-bottom:8px;font-size:18px}
.leave-info p{color:var(--gray);margin:4px 0;font-size:14px}
.leave-actions{display:flex;gap:10px}
.btn-action{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-weight:500;transition:all 0.3s;font-size:14px}
.btn-share{background:var(--primary);color:white}
.btn-share:hover{background:var(--primary-dark)}
#leavesLoading,#leavesEmpty{text-align:center;padding:40px;color:var(--gray)}
#leavesLoading{display:none}
#leavesEmpty{display:none}
@media(max-width:768px){
.form-grid{grid-template-columns:1fr}
.header{flex-direction:column;gap:15px;text-align:center}
.header-actions{width:100%;justify-content:center}
.tabs{flex-direction:column}
.tab-btn{border-bottom:1px solid var(--border);border-left:none}
.tab-btn.active{border-bottom-color:var(--primary)}
}
</style>
</head>
<body>

<div class="login-container" id="loginSection">
<h1>بوابة الإجازات المرضية - ذكية</h1>
<div class="form-group">
<label>اسم المستخدم</label>
<input type="text" id="loginUser" placeholder="أدخل اسم المستخدم">
</div>
<div class="form-group">
<label>كلمة المرور</label>
<input type="password" id="loginPass" placeholder="أدخل كلمة المرور">
</div>
<div id="error"></div>
<button class="btn-primary" onclick="doLogin()">دخول</button>
</div>

<div class="app-container" id="appSection">
<div class="header">
<h1>بوابة الإجازات المرضية - ذكية</h1>
<div class="header-actions">
<span id="headerUser"></span>
<button class="btn-logout" onclick="doLogout()">خروج</button>
</div>
</div>

<div class="tabs">
<button class="tab-btn active" onclick="switchTab('add',this)">إضافة إجازة</button>
<button class="tab-btn" onclick="switchTab('my',this)">إجازاتي</button>
</div>

<div class="tab-content active" id="tab-add">
<form id="leaveForm" onsubmit="submitLeave(event)">

<div class="section">
<div class="section-title">🆔 القسم الأول — بيانات الإجازة والمريض</div>
<div class="form-grid">
<div class="field-group">
<label>رمز الإجازة Leave ID</label>
<input type="text" id="leaveId" readonly>
</div>
<div class="field-group">
<label>اسم المريض بالعربي عربي ذكي</label>
<div class="input-with-btn">
<input type="text" id="nameAr" placeholder="أدخل الاسم بالعربي">
<button type="button" class="btn-translate" onclick="autoTranslate('name')">🔄 ترجم</button>
</div>
</div>
<div class="field-group">
<label>اسم المريض بالإنجليزي English</label>
<input type="text" id="nameEn" placeholder="English Name">
</div>
<div class="field-group">
<label>رقم الهوية / الإقامة ID / Iqama</label>
<input type="text" id="iqama" placeholder="أدخل رقم الهوية">
</div>
</div>
</div>

<div class="section">
<div class="section-title">👤 القسم الثاني — البيانات الشخصية</div>
<div class="form-grid">
<div class="field-group">
<label>الجنسية بالعربي عربي</label>
<div class="input-with-btn">
<input type="text" id="natAr" placeholder="أدخل الجنسية بالعربي" oninput="autoTranslate('nationality')">
<button type="button" class="btn-translate" onclick="autoTranslate('nationality')">🔄 ترجم</button>
</div>
</div>
<div class="field-group">
<label>الجنسية بالإنجليزي English</label>
<input type="text" id="natEn" placeholder="Nationality">
</div>
<div class="field-group">
<label>جهة العمل بالعربي عربي</label>
<input type="text" id="employerAr" placeholder="أدخل جهة العمل">
</div>
<div class="field-group">
<label>جهة العمل بالإنجليزي اختياري</label>
<input type="text" id="employerEn" placeholder="Employer (Optional)">
</div>
</div>
</div>

<div class="section">
<div class="section-title">🩺 القسم الثالث — البيانات الطبية</div>
<div class="form-grid">
<div class="field-group">
<label>اسم الممارس بالعربي عربي ذكي</label>
<div class="input-with-btn">
<input type="text" id="docAr" placeholder="أدخل اسم الطبيب">
<button type="button" class="btn-translate" onclick="autoTranslate('doctor')">🔄 ترجم</button>
</div>
</div>
<div class="field-group">
<label>اسم الممارس بالإنجليزي English</label>
<input type="text" id="docEn" placeholder="Doctor Name">
</div>
<div class="field-group">
<label>المسمى الوظيفي بالعربي عربي</label>
<select id="posAr" onchange="syncPos()">
<option value="">— اختر —</option>
<option value="استشاري">استشاري</option>
<option value="أخصائي">أخصائي</option>
<option value="طبيب عام">طبيب عام</option>
<option value="ممارس صحي">ممارس صحي</option>
<option value="طبيب أسنان">طبيب أسنان</option>
<option value="طبيب مقيم">طبيب مقيم</option>
<option value="أخرى">أخرى (يدوي)</option>
</select>
</div>
<div class="field-group">
<label>المسمى الوظيفي بالإنجليزي English</label>
<select id="posEn">
<option value="">— اختر —</option>
<option value="Consultant">Consultant</option>
<option value="Specialist">Specialist</option>
<option value="General Practitioner">General Practitioner</option>
<option value="Health Practitioner">Health Practitioner</option>
<option value="Dentist">Dentist</option>
<option value="Resident">Resident</option>
<option value="Other">Other</option>
</select>
</div>
<div class="field-group" id="posManual" style="display:none">
<label>المسمى يدوياً بالعربي</label>
<input type="text" id="posArM" placeholder="أدخل المسمى">
</div>
<div class="field-group" id="posManualEn" style="display:none">
<label>المسمى يدوياً بالإنجليزي</label>
<input type="text" id="posEnM" placeholder="Enter Position">
</div>
</div>
</div>

<div class="section">
<div class="section-title">📅 القسم الرابع — التواريخ والمدة</div>
<div class="form-grid">
<div class="field-group">
<label>تاريخ الإصدار Issue Date</label>
<input type="date" id="issueDate">
</div>
<div class="field-group">
<label>المدة تلقائي</label>
<input type="text" id="durDisplay" readonly>
</div>
<div class="field-group">
<label>تاريخ البداية بالميلادي Admission AD</label>
<input type="date" id="admAD" onchange="calcAll()">
</div>
<div class="field-group">
<label>تاريخ البداية بالهجري قابل للتعديل</label>
<input type="text" id="admAH" placeholder="تاريخ الهجري">
</div>
<div class="field-group">
<label>تاريخ النهاية بالميلادي Discharge AD</label>
<input type="date" id="disAD" onchange="calcAll()">
</div>
<div class="field-group">
<label>تاريخ النهاية بالهجري قابل للتعديل</label>
<input type="text" id="disAH" placeholder="تاريخ الهجري">
</div>
</div>
</div>

<div class="section">
<div class="section-title">🏥 القسم الخامس — معلومات المستشفى</div>
<div class="form-grid">
<div class="field-group">
<label>اسم المستشفى للشعار للشعار</label>
<select id="hospitalLogoName" onchange="selectHospitalForLogo()">
<option value="">— اختر المستشفى للشعار —</option>
</select>
</div>
<div class="field-group">
<label>اسم المستشفى بالعربي عربي ذكي</label>
<div class="input-with-btn">
<input type="text" id="hospAr" placeholder="أدخل اسم المستشفى" oninput="searchHospital()" onfocus="showHospitalSuggestions()">
<button type="button" class="btn-translate" onclick="autoTranslate('hospital')">🔄 ترجم</button>
</div>
<div class="hospital-suggestions" id="hospitalSuggestions"></div>
</div>
<div class="field-group">
<label>اسم المستشفى بالإنجليزي English</label>
<input type="text" id="hospEn" placeholder="Hospital Name">
</div>
<div class="field-group">
<label>رقم الترخيص License No.</label>
<input type="text" id="licenseNo" placeholder="أدخل رقم الترخيص">
</div>
</div>
</div>

<button type="submit" class="btn-submit" id="submitBtn">💾 حفظ وإصدار PDF</button>
<div id="submitStatus"></div>
<div id="pdfArea"></div>

</form>
</div>

<div class="tab-content" id="tab-my">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
<h2>📂 إجازاتي</h2>
<button class="btn-translate" onclick="loadMyLeaves()">🔄 تحديث</button>
</div>
<div id="leavesLoading">⏳ جاري التحميل...</div>
<div id="leavesEmpty">📭 لا توجد إجازات مسجّلة باسمك بعد.</div>
<div class="leaves-list" id="leavesList"></div>
</div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzpIpO-7STEcj5PD_glyXlLV0Tt9_Ac70aqaU4ZPOAzuS5NLFwkp-oOpGDzgdWqM6j-vw/exec';
let SESSION = { user:'', pass:'' };

// Smart Translation System
const TRANSLATION_CACHE = {};
let isTranslating = false;

// Google Translate API simulation (using free translation service)
async function translateText(text, fromLang = 'ar', toLang = 'en') {
if (TRANSLATION_CACHE[text]) return TRANSLATION_CACHE[text];

try {
// Using MyMemory API (free translation service)
const apiKey = ''; // Free API key
const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=' + fromLang + '|' + toLang;

const response = await fetch(url);
const data = await response.json();

if (data.responseStatus === 200) {
const translated = data.responseData.translatedText;
TRANSLATION_CACHE[text] = translated;
return translated;
}
} catch (error) {
console.log('Translation API error, using fallback');
}

// Fallback: simple character mapping for Arabic names
return fallbackTranslate(text);
}

function fallbackTranslate(arabicText) {
const mapping = {
'أ': 'A', 'ب': 'B', 'ت': 'T', 'ث': 'TH', 'ج': 'J', 'ح': 'H', 'خ': 'KH', 'د': 'D',
'ذ': 'DH', 'ر': 'R', 'ز': 'Z', 'س': 'S', 'ش': 'SH', 'ص': 'S', 'ض': 'D', 'ط': 'T',
'ظ': 'DH', 'ع': 'A', 'غ': 'GH', 'ف': 'F', 'ق': 'Q', 'ك': 'K', 'ل': 'L', 'م': 'M',
'ن': 'N', 'ه': 'H', 'و': 'W', 'ي': 'Y', 'ى': 'A', 'ة': 'H', 'ء': 'A',
'إ': 'A', 'آ': 'A', 'ؤ': 'U', 'ئ': 'E'
};

return arabicText.split('').map(char => mapping[char] || char).join('').toUpperCase();
}

async function autoTranslate(field) {
if (isTranslating) return;

const arField = document.getElementById(field === 'name' ? 'nameAr' : field === 'doctor' ? 'docAr' : field === 'nationality' ? 'natAr' : 'hospAr');
const enField = document.getElementById(field === 'name' ? 'nameEn' : field === 'doctor' ? 'docEn' : field === 'nationality' ? 'natEn' : 'hospEn');
const translateBtn = arField.parentElement.querySelector('.btn-translate');

if (!arField.value.trim()) return;

isTranslating = true;
translateBtn.disabled = true;
translateBtn.textContent = '⏳ جاري الترجمة...';

try {
let translated = await translateText(arField.value.trim());

// Special handling for doctor names
if (field === 'doctor') {
// Remove any DR/dr prefix from translation to avoid duplication
translated = translated.replace(/^DR\.?\s*/i, '').replace(/^DR\s*/i, '').replace(/^DR\.\s*/i, '');
// Add DR prefix if Arabic starts with د/
if (arField.value.trim().startsWith('د/')) {
translated = 'DR. ' + translated;
} else {
translated = 'DR. ' + translated;
}
}

// Make ALL CAPS
translated = translated.toUpperCase();

enField.value = translated;
translateBtn.textContent = '✅ تم';

setTimeout(() => {
translateBtn.textContent = '🔄 ترجم';
translateBtn.disabled = false;
}, 2000);

} catch (error) {
translateBtn.textContent = '❌ خطأ';
setTimeout(() => {
translateBtn.textContent = '🔄 ترجم';
translateBtn.disabled = false;
}, 2000);
} finally {
isTranslating = false;
}
}

// Hospital search functionality
let hospitalSearchTimeout;
let HOSPITAL_DATABASE = [];

function searchHospital() {
clearTimeout(hospitalSearchTimeout);
const searchInput = document.getElementById('hospAr');
const suggestionsDiv = document.getElementById('hospitalSuggestions');

hospitalSearchTimeout = setTimeout(() => {
const searchTerm = searchInput.value.trim().toLowerCase();
if (searchTerm.length < 2) {
suggestionsDiv.style.display = 'none';
return;
}

const matches = HOSPITAL_DATABASE.filter(h =>
h.ar.toLowerCase().includes(searchTerm) ||
h.en.toLowerCase().includes(searchTerm)
);

if (matches.length > 0) {
suggestionsDiv.innerHTML = matches.map(h =>
'<div onclick="selectHospital(\'' + h.ar + '\', \'' + h.en + '\')">' + h.ar + ' - ' + h.en + '</div>'
).join('');
suggestionsDiv.style.display = 'block';
} else {
suggestionsDiv.style.display = 'none';
}
}, 300);
}

function showHospitalSuggestions() {
const searchInput = document.getElementById('hospAr');
const suggestionsDiv = document.getElementById('hospitalSuggestions');

if (searchInput.value.trim().length === 0 && HOSPITAL_DATABASE.length > 0) {
// Show all hospitals when input is empty
suggestionsDiv.innerHTML = HOSPITAL_DATABASE.map(h =>
'<div onclick="selectHospital(\'' + h.ar + '\', \'' + h.en + '\')">' + h.ar + ' - ' + h.en + '</div>'
).join('');
suggestionsDiv.style.display = 'block';
}
}

function selectHospital(arName, enName) {
document.getElementById('hospAr').value = arName;
document.getElementById('hospEn').value = enName;
document.getElementById('hospitalSuggestions').style.display = 'none';

// Also select the hospital logo if it exists in the dropdown
const logoSelect = document.getElementById('hospitalLogoName');
for (let i = 0; i < logoSelect.options.length; i++) {
if (logoSelect.options[i].value === arName) {
logoSelect.selectedIndex = i;
break;
}
}
}

// دالة لجلب قائمة المستشفيات من Sheet
async function loadHospitalList() {
try {
const url = SCRIPT_URL + '?action=getHospitalList';
const response = await fetch(url);
const result = await response.json();

if (result.status === 'success') {
const select = document.getElementById('hospitalLogoName');
select.innerHTML = '<option value="">— اختر المستشفى للشعار —</option>';

// Update HOSPITAL_DATABASE from server data
HOSPITAL_DATABASE = [];

result.hospitals.forEach(hospital => {
const option = document.createElement('option');
option.value = hospital.nameAr;
option.textContent = hospital.nameAr + ' - ' + hospital.nameEn;
select.appendChild(option);

// Add to HOSPITAL_DATABASE for search
HOSPITAL_DATABASE.push({
ar: hospital.nameAr,
en: hospital.nameEn
});
});
}
} catch (error) {
console.log('Error loading hospital list:', error);
}
}

// دالة عند اختيار مستشفى للشعار
function selectHospitalForLogo() {
const selectedHospital = document.getElementById('hospitalLogoName').value;
if (selectedHospital) {
// البحث في قاعدة البيانات المحلية
const hospital = HOSPITAL_DATABASE.find(h => h.ar === selectedHospital);
if (hospital) {
document.getElementById('hospAr').value = hospital.ar;
document.getElementById('hospEn').value = hospital.en;
}
}
}

// Hide suggestions when clicking outside
document.addEventListener('click', function(e) {
if (!e.target.closest('.field-group')) {
document.getElementById('hospitalSuggestions').style.display = 'none';
}
});

// دالة تسجيل الدخول المعدلة - تتحقق من السيرفر
async function doLogin(){
var u=document.getElementById('loginUser').value.trim();
var p=document.getElementById('loginPass').value;
var err=document.getElementById('loginError');
var btn=document.querySelector('.btn-primary');

if(!u||!p){
err.style.display='block';
err.style.color='var(--danger)';
err.textContent='أدخل اسم المستخدم وكلمة المرور';
return;
}

// إظهار حالة التحميل
btn.disabled=true;
btn.textContent='جاري التحقق...';
err.style.display='none';

try {
// التحقق من السيرفر
var response = await fetch(SCRIPT_URL, {
method: 'POST',
headers: {'Content-Type': 'text/plain'},
body: JSON.stringify({
action: 'verifyLogin',
username: u,
password: p
})
});
var result = await response.json();

if(result.status === 'success') {
SESSION={user:u,pass:p};
document.getElementById('headerUser').textContent='مرحباً '+u;
document.getElementById('loginSection').style.display='none';

function todayISO(){return new Date().toISOString().split('T')[0];}

function fmtDate(iso){
if(!iso)return'';
var d=new Date(iso);
return String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+d.getFullYear();
}

function toHijri(date){
var gD=date.getDate(),gM=date.getMonth()+1,gY=date.getFullYear();
// Corrected Hijri conversion algorithm (subtract 2 days to fix the advance issue)
var JD=Math.floor((1461*(gY+4800+Math.floor((gM-14)/12)))/4)+
Math.floor((367*(gM-2-12*Math.floor((gM-14)/12)))/12)-
Math.floor((3*(Math.floor((gY+4900+Math.floor((gM-14)/12))/100)))/4)+gD-32077;
var l=JD-1948440+10632,n=Math.floor((l-1)/10631);
l=l-10631*n+354;
var j=Math.floor((10985-l)/5316)*Math.floor((50*l)/17719)+Math.floor(l/5670)*Math.floor((43*l)/15238);
l=l-Math.floor((30-j)/15)*Math.floor((17719*j)/50)-Math.floor(j/16)*Math.floor((15238*j)/43)+29;
var hM=Math.floor((24*l)/709),hD=l-Math.floor((709*hM)/24),hY=30*n+j-30;
return String(hD).padStart(2,'0')+'-'+String(hM).padStart(2,'0')+'-'+hY;
}

function calcAll(){
var a=document.getElementById('admAD').value;
var d=document.getElementById('disAD').value;
// Only update Hijri dates if they are empty (allow manual editing)
if(a && !document.getElementById('admAH').value)document.getElementById('admAH').value=toHijri(new Date(a));
if(d && !document.getElementById('disAH').value)document.getElementById('disAH').value=toHijri(new Date(d));
if(a&&d){
var diff=Math.round((new Date(d)-new Date(a))/(864e5))+1;
if(diff>0){
var ar=diff===1?diff+' يوم':diff+' أيام';
var en=diff===1?diff+' Day':diff+' Days';
document.getElementById('durDisplay').value=ar+' / '+en;
}
}
}

async function submitLeave(e){
e.preventDefault();
var btn=document.getElementById('submitBtn');
var status=document.getElementById('submitStatus');
var pdfArea=document.getElementById('pdfArea');
var posArV=document.getElementById('posAr').value==='أخرى'?document.getElementById('posArM').value:document.getElementById('posAr').value;
var posEnV=document.getElementById('posEn').value==='Other'?document.getElementById('posEnM').value:document.getElementById('posEn').value;
var dur=document.getElementById('durDisplay').value||'';
var dp=dur.split(' / ');

var payload={
action:'addLeave',
username:SESSION.user,
password:SESSION.pass,
leaveId:document.getElementById('leaveId').value.trim(),
nameAr:document.getElementById('nameAr').value.trim(),
nameEn:document.getElementById('nameEn').value.trim(),
iqama:document.getElementById('iqama').value.trim(),
durAr:dp[0]||'',
durEn:dp[1]||'',
docAr:document.getElementById('docAr').value.trim(),
docEn:document.getElementById('docEn').value.trim(),
posAr:posArV,
posEn:posEnV,
natAr:document.getElementById('natAr').value.trim(),
natEn:document.getElementById('natEn').value.trim(),
employerAr:document.getElementById('employerAr').value.trim(),
employerEn:document.getElementById('employerEn').value.trim(),
admissionAD:document.getElementById('admAD').value,
admissionAH:document.getElementById('admAH').value,
dischargeAD:document.getElementById('disAD').value,
dischargeAH:document.getElementById('disAH').value,
issueDate:document.getElementById('issueDate').value,
hospAr:document.getElementById('hospAr').value.trim(),
hospEn:document.getElementById('hospEn').value.trim(),
hospitalLogoName:document.getElementById('hospitalLogoName').value.trim(),
licenseNo:document.getElementById('licenseNo').value.trim()
};

btn.disabled=true;
btn.textContent='⏳ جاري الحفظ وإنشاء PDF...';
status.className='';status.textContent='';
pdfArea.innerHTML='';

try{
var res=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
var result=await res.json();
if(result.status==='success'){
status.className='success';
status.textContent='✅ تم الحفظ بنجاح!';
pdfArea.innerHTML='<a href="'+result.pdfUrl+'" target="_blank">📄 تحميل PDF</a>';

// Reset form and generate new Leave ID
document.getElementById('leaveForm').reset();
document.getElementById('issueDate').value=todayISO();
document.getElementById('hospitalLogoName').selectedIndex = 0;

// Generate new Leave ID for next entry
await generateLeaveId();

}else{throw new Error(result.message||'خطأ غير معروف');}
}catch(err){
status.className='error';
status.textContent='❌ خطأ: '+err.message;
}finally{
btn.disabled=false;
btn.textContent='💾 حفظ وإصدار PDF';
}
}

async function loadMyLeaves(){

empty.style.display='none';

res.leaves.slice().reverse().forEach(function(lv, index){

function downloadPDF(leaveId) {

} catch (error) {

}
